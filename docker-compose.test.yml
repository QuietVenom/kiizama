services:

  prestart:
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_test:5432/app_test
      POSTGRES_SERVER: postgres_test
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  backend:
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_test:5432/app_test
      POSTGRES_SERVER: postgres_test
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  postgres_test:
    image: postgres:18
    restart: "no"
    environment:
      - POSTGRES_DB=${POSTGRES_TEST_DB-app_test}
      - POSTGRES_USER=${POSTGRES_TEST_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_TEST_PASSWORD-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER-postgres} -d ${POSTGRES_TEST_DB-app_test}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - "${POSTGRES_TEST_PORT-55432}:5432"

  redis:
    image: redis:7.4-alpine
    restart: "no"
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  playwright:
    build:
      context: ./frontend
      dockerfile: Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=production
    init: true
    ipc: host
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend:8000
      - FIRST_SUPERUSER=${FIRST_SUPERUSER}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI-}
    volumes:
      - ./frontend/blob-report:/app/blob-report
      - ./frontend/test-results:/app/test-results
    ports:
      - 9323:9323
