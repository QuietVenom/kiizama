map "$host|$uri" $host_redirect_target {
  default "";

  # Redirect apex domains to www.<domain>.
  ~^(?<base>[^.]+\.[^.|]+)\|/.*$ www.$base;

  # Keep private/auth routes under app.<domain>.
  ~^www\.(?<base>[^|]+)\|/(login|app|admin|settings|recover-password|reset-password|signup)(?:/.*)?$ app.$base;

  # Keep landing home under www.<domain>.
  ~^app\.(?<base>[^|]+)\|/$ www.$base;
}

server {
  listen 80;

  if ($host_redirect_target != "") {
    return 308 https://$host_redirect_target$request_uri;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
