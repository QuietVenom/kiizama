[project]
name = "kiizama-scrape-core"
version = "0.1.0"
description = "Shared scrape core for Kiizama backend and worker runtimes."
requires-python = ">=3.10,<4.0"
dependencies = [
    "cryptography>=46.0.4",
    "openai>=2.5.0",
    "playwright>=1.55.0",
    "pydantic>2.0",
    "pymongo>=4.15.5",
    "redis>=5.2.1,<6.0.0",
    "tenacity>=8.2.3,<9.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
