services:

  prestart:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_TLS=${SMTP_TLS}
      - SMTP_SSL=${SMTP_SSL}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - EMAILS_FROM_NAME=${EMAILS_FROM_NAME-}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_PRODUCTION_INTERNAL=${DATABASE_URL_PRODUCTION_INTERNAL}
      - POSTGRES_SERVER=${POSTGRES_SERVER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_KIIZAMA_IG=${MONGODB_KIIZAMA_IG}
      - SENTRY_DSN=${SENTRY_DSN}
      - REDIS_URL=${REDIS_URL}
      - JOB_CONTROL_TERMINAL_STATE_TTL_SECONDS=${JOB_CONTROL_TERMINAL_STATE_TTL_SECONDS}
      - USER_EVENTS_STREAM_MAXLEN=${USER_EVENTS_STREAM_MAXLEN}
      - USER_EVENTS_SSE_READ_BLOCK_MS=${USER_EVENTS_SSE_READ_BLOCK_MS}
      - JOB_CONTROL_QUEUE_MAXLEN=${JOB_CONTROL_QUEUE_MAXLEN}

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    depends_on:
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_TLS=${SMTP_TLS}
      - SMTP_SSL=${SMTP_SSL}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - EMAILS_FROM_NAME=${EMAILS_FROM_NAME-}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_PRODUCTION_INTERNAL=${DATABASE_URL_PRODUCTION_INTERNAL}
      - POSTGRES_SERVER=${POSTGRES_SERVER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_KIIZAMA_IG=${MONGODB_KIIZAMA_IG}
      - SENTRY_DSN=${SENTRY_DSN}
      - REDIS_URL=${REDIS_URL}
      - JOB_CONTROL_TERMINAL_STATE_TTL_SECONDS=${JOB_CONTROL_TERMINAL_STATE_TTL_SECONDS}
      - USER_EVENTS_STREAM_MAXLEN=${USER_EVENTS_STREAM_MAXLEN}
      - USER_EVENTS_SSE_READ_BLOCK_MS=${USER_EVENTS_SSE_READ_BLOCK_MS}
      - JOB_CONTROL_QUEUE_MAXLEN=${JOB_CONTROL_QUEUE_MAXLEN}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

    build:
      context: .
      dockerfile: backend/Dockerfile

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}'
    restart: always
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL?Variable not set}
        - NODE_ENV=production
