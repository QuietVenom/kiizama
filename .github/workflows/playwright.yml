name: Playwright Tests

on:
  push:
    branches:
    - main
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: 'false'

jobs:
  changes:
    runs-on: ubuntu-latest
    # Set job outputs to values from filter step
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
    - uses: actions/checkout@v5
    # For pull requests it's not necessary to checkout the code but for the main branch it is
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          changed:
            - backend/**
            - frontend/**
            - .env
            - .env.example
            - docker-compose*.yml
            - scripts/test-local.sh
            - .github/workflows/playwright.yml
            - .github/workflows/test-frontend.yml

  playwright-shards:
    needs:
      - changes
    if: ${{ needs.changes.outputs.changed == 'true' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    name: playwright-shards (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_test:5432/app_test
      POSTGRES_TEST_DB: app_test
      POSTGRES_TEST_USER: postgres
      POSTGRES_TEST_PASSWORD: postgres
    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
      fail-fast: false
    steps:
    - uses: actions/checkout@v5
    - name: Prepare .env for CI
      run: |
        cp .env.example .env
        printf "\nDATABASE_URL=%s\n" "${DATABASE_URL}" >> .env
        printf "RATE_LIMIT_ENABLED=false\n" >> .env
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'true' }}
      with:
        limit-access-to-actor: true
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.4.15"
        enable-cache: true
    - name: Run Playwright tests
      run: bash scripts/test-local.sh playwright --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    - name: Upload blob report to GitHub Actions Artifacts
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: blob-report-${{ matrix.shardIndex }}
        path: frontend/blob-report
        include-hidden-files: true
        retention-days: 1

  merge-playwright-reports:
    needs:
      - playwright-shards
      - changes
    # Merge reports after playwright-tests, even if some shards have failed
    if: ${{ !cancelled() && needs.changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Prepare .env for CI
      run: cp .env.example .env
    - uses: actions/setup-node@v5
      with:
        node-version: 20
    - name: Install dependencies
      run: npm ci
      working-directory: frontend
    - name: Download blob reports from GitHub Actions Artifacts
      uses: actions/download-artifact@v5
      with:
        path: frontend/downloaded-blob-reports
        pattern: blob-report-*
    - name: Stage blob reports for merge
      working-directory: frontend
      run: |
        rm -rf ./all-blob-reports
        mkdir -p ./all-blob-reports
        find ./downloaded-blob-reports -type f -name 'report-*.zip' -exec cp {} ./all-blob-reports/ \;
    - name: Check blob reports presence
      id: blob_reports
      working-directory: frontend
      run: |
        if [ -d "./all-blob-reports" ] && [ "$(find ./all-blob-reports -type f -name 'report-*.zip' | wc -l)" -gt 0 ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No Playwright blob reports found; skipping merge step."
        fi
    - name: Merge into HTML Report
      if: ${{ steps.blob_reports.outputs.found == 'true' }}
      run: npx playwright merge-reports --reporter html ./all-blob-reports
      working-directory: frontend
    - name: Upload HTML report
      if: ${{ steps.blob_reports.outputs.found == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: html-report--attempt-${{ github.run_attempt }}
        path: frontend/playwright-report
        retention-days: 30
        include-hidden-files: true

  # https://github.com/marketplace/actions/alls-green#why
  test-playwright:  # Stable check name for branch protection
    if: always()
    needs:
      - playwright-shards
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: playwright-shards
