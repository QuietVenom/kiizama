name: Generate Client

on:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened

jobs:
  generate-client:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Prepare .env for CI
      run: cp .env.example .env
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.4.15"
        enable-cache: true
    - name: Install dependencies
      run: npm ci
      working-directory: frontend
    - run: uv sync
      working-directory: backend
    - name: Verify generated frontend client
      run: bash scripts/check-generated-client.sh --mode ci
      env:
        VIRTUAL_ENV: backend/.venv
        SECRET_KEY: just-for-generating-client
        POSTGRES_PASSWORD: just-for-generating-client
        FIRST_SUPERUSER_PASSWORD: just-for-generating-client
