name: Generate Client

on:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened

jobs:
  generate-client:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    # For PRs from forks (no push permissions to contributor branches)
    - uses: actions/checkout@v5
      if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
    # For PRs from the same repo (checkout head branch so we can push generated changes)
    - uses: actions/checkout@v5
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      with:
        ref: ${{ github.head_ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Prepare .env for CI
      run: cp .env.example .env
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.4.15"
        enable-cache: true
    - name: Install dependencies
      run: npm ci
      working-directory: frontend
    - run: uv sync
      working-directory: backend
    - run: uv run bash scripts/generate-client.sh
      env:
        VIRTUAL_ENV: backend/.venv
        SECRET_KEY: just-for-generating-client
        POSTGRES_PASSWORD: just-for-generating-client
        FIRST_SUPERUSER_PASSWORD: just-for-generating-client
    - name: Add changes to git
      run: |
        git config --local user.email "github-actions@github.com"
        git config --local user.name "github-actions"
        git add frontend/src/client
    - name: Detect generated changes
      id: generated_changes
      run: |
        if git diff --staged --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi
    - name: Check whether head branch is protected
      id: head_branch
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository && steps.generated_changes.outputs.changed == 'true' }}
      uses: actions/github-script@v7
      with:
        script: |
          const branch = context.payload.pull_request.head.ref;
          const response = await github.rest.repos.getBranch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            branch,
          });
          core.setOutput("protected", response.data.protected ? "true" : "false");
    # Same repo PRs
    - name: Push changes
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository && steps.generated_changes.outputs.changed == 'true' && steps.head_branch.outputs.protected != 'true' }}
      run: |
        git commit -m "✨ Autogenerate frontend client"
        git push
    - name: Create PR for generated changes
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository && steps.generated_changes.outputs.changed == 'true' && steps.head_branch.outputs.protected == 'true' }}
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: ci/generate-client/pr-${{ github.event.pull_request.number }}
        base: ${{ github.event.pull_request.head.ref }}
        delete-branch: true
        commit-message: "✨ Autogenerate frontend client"
        title: "✨ Autogenerate frontend client"
        body: |
          This automated PR updates the generated frontend client for #${{ github.event.pull_request.number }}.

          The source branch `${{ github.event.pull_request.head.ref }}` is protected, so the workflow cannot push directly to it.
    # Fork PRs
    - name: Check changes
      if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
      run: |
        git diff --staged --quiet || (echo "Changes detected in generated client, run scripts/generate-client.sh and commit the changes" && exit 1)
