name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      RATE_LIMIT_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Prepare .env for CI
        run: cp .env.example .env
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.4.15"
          enable-cache: true
      - name: Run tests
        run: bash scripts/test-local.sh backend
      - name: Store coverage files
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
