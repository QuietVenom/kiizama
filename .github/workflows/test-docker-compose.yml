name: Test Docker Compose

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_test:5432/app_test
      POSTGRES_TEST_DB: app_test
      POSTGRES_TEST_USER: postgres
      POSTGRES_TEST_PASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: docker compose build
      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d --wait postgres_test backend frontend adminer
      - name: Test backend is up
        run: curl http://localhost:8000/api/v1/health-check/
      - name: Test frontend is up
        run: curl http://localhost:5173
      - run: docker compose down -v --remove-orphans
