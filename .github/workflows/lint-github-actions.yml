name: Lint GitHub Actions

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
      - .github/labeler.yml
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
      - .github/labeler.yml
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/actionlint@v1
