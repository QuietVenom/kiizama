# fly.toml app configuration file generated for kiizama-frontend on 2026-05-02T02:53:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kiizama-frontend'
primary_region = 'iad'

[build]

[build.args]
  VITE_API_URL = "https://api.kiizama.com"
  VITE_SITE_URL = "https://kiizama.com"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
