app = "kiizama-frontend"
primary_region = "dfw"

# Deploy from the frontend directory so this Dockerfile keeps using
# frontend/ as the Docker build context:
# fly deploy ./frontend --config ../fly.frontend.toml
#
# This app only needs the public backend origin at build time.
# Stripe billing secrets stay in the backend app. The frontend only calls
# backend billing endpoints and never uses Stripe secret/webhook config.

[build.args]
  VITE_API_URL = "https://api.kiizama.com"

[http_service]
  internal_port = 80
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
