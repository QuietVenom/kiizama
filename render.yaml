services:
  - type: web
    name: kiizama-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - backend/**
    dockerCommand: sh -c 'fastapi run --workers 4 --host 0.0.0.0 --port ${PORT:-8000} app/main.py'
    healthCheckPath: /api/v1/health-check/
    domains:
      - api.kiizama.com
    autoDeploy: true
    envVars:
      # Backend required vars.
      - key: PROJECT_NAME
        value: "Kiizama API"
      - key: SECRET_KEY
        sync: false
      - key: SECRET_KEY_IG_CREDENTIALS
        sync: false
      - key: FIRST_SUPERUSER
        sync: false
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false
      - key: POSTGRES_SERVER
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_KIIZAMA_IG
        value: "kiizama_ig"

      # Optional backend vars.
      - key: ENVIRONMENT
        value: "production"
      - key: FRONTEND_HOST
        value: "https://app.kiizama.com"
      - key: BACKEND_CORS_ORIGINS
        value: "https://www.kiizama.com,https://app.kiizama.com"
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        value: "smtp.sendgrid.net"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: "True"
      - key: SMTP_SSL
        value: "False"
      - key: SMTP_USER
        value: "apikey"
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAILS_FROM_EMAIL
        sync: false

  - type: worker
    name: kiizama-scrape-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    dockerContext: .
    buildFilter:
      paths:
        - backend/**
        - scrape_worker/**
        - Dockerfile.worker
    dockerCommand: python -m scrape_worker.main
    autoDeploy: true
    envVars:
      # Worker-specific required vars.
      - key: IG_SCRAPE_WORKER_MONGODB_URL
        sync: false
      - key: IG_SCRAPE_WORKER_MONGODB_KIIZAMA_IG
        value: "kiizama_ig"
      - key: IG_SCRAPE_WORKER_SECRET_KEY_IG_CREDENTIALS
        sync: false
      - key: IG_SCRAPE_WORKER_OPENAI_API_KEY
        sync: false

      # Optional runtime tuning.
      - key: IG_SCRAPE_WORKER_ID
        sync: false
      - key: IG_SCRAPE_WORKER_POLL_SECONDS
        value: "1"
      - key: IG_SCRAPE_WORKER_HEARTBEAT_SECONDS
        value: "20"
      - key: IG_SCRAPE_WORKER_LEASE_SECONDS
        value: "900"
      - key: IG_SCRAPE_WORKER_MAX_ATTEMPTS
        value: "3"
      - key: IG_SCRAPE_WORKER_ERROR_MAX_LEN
        value: "4000"

  - type: web
    name: kiizama-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - frontend/**
    healthCheckPath: /
    domains:
      - www.kiizama.com
      - app.kiizama.com
    autoDeploy: true
    envVars:
      # Frontend build-time vars.
      - key: VITE_API_URL
        value: "https://api.kiizama.com"
