app = "kiizama-scrape-worker"
primary_region = "dfw"

# Deploy from the repository root because this image copies
# packages/ and scrape_worker/ from the monorepo root:
# fly deploy . --config fly.scrape-worker.toml
#
# This app stays private by design: no http_service and no services means
# no public listener is configured. If the worker later needs the backend
# over private networking, target http://kiizama-backend.internal:8000.
#
# Required Fly secrets for this app include:
# SECRET DATABASE_URL
# SECRET REDIS_URL
# SECRET SECRET_KEY_IG_CREDENTIALS
# SECRET OPENAI_API_KEY
# SECRET SYSTEM_ADMIN_PASSWORD
#
# IG_SCRAPE_WORKER_BACKEND_BASE_URL is required and is not a secret.

[build]
  dockerfile = "Dockerfile.worker"

[env]
  IG_SCRAPER_MAX_CONCURRENT = "2"
  IG_SCRAPE_WORKER_BACKEND_BASE_URL = "http://kiizama-backend.internal:8000"
  IG_SCRAPE_WORKER_POLL_SECONDS = "1"
  IG_SCRAPE_WORKER_HEARTBEAT_SECONDS = "20"
  IG_SCRAPE_WORKER_LEASE_SECONDS = "900"
  IG_SCRAPE_WORKER_MAX_ATTEMPTS = "3"
  IG_SCRAPE_WORKER_ERROR_MAX_LEN = "4000"
  JOB_CONTROL_TERMINAL_STATE_TTL_SECONDS = "86400"
  JOB_CONTROL_QUEUE_MAXLEN = "10000"

[processes]
  app = "python -m scrape_worker.main"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "4096mb"
  processes = ["app"]
